<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বই সংরক্ষণ অ্যাপ | বুক লিস্ট ম্যানেজার</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>আমার বইয়ের শেলফ</h1>
            <p>বইয়ের নাম এবং লেখকের নাম লিখুন - সহজেই সংরক্ষণ করুন</p>
        </div>
    
        <div class="form-section">
            <div class="form-row">
                <div class="form-group">
                    <label>বইয়ের নাম</label>
                    <input type="text" id="bookName" placeholder="যেমন: হিমু, দেয়াল, ইত্যাদি">
                </div>
                <div class="form-group">
                    <label>লেখকের নাম</label>
                    <input type="text" id="authorName" placeholder="যেমন: হুমায়ূন আহমেদ">
                </div>
            </div>
            <button class="btn" id="addBookBtn">➕ বই সংরক্ষণ করুন</button>
        </div>
    
        <div class="table-section">
            <table id="bookTable">
                <thead>
                    <tr>
                        <th>ক্রমিক নং</th>
                        <th>বইয়ের নাম</th>
                        <th>লেখকের নাম</th>
                        <th>অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="bookTableBody">
                    <tr class="empty-row">
                        <td colspan="4">এখনো কোনো বই যোগ করা হয়নি</td>
                    </tr>
                </tbody>
            </table>
        </div>
    
        <div class="stats">
            <div>মোট বই: <span class="book-count" id="totalBooks">0</span> টি</div>
            <button class="clear-all-btn" id="clearAllBtn">সব বই মুছুন</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
