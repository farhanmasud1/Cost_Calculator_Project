<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>খরচের ক্যালকুলেটর</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> খরচের ক্যালকুলেটর</h1>
    
        <div class="input-group">
            <input type="text" id="expenseInput" placeholder="টাকার পরিমাণ লিখুন (যেমন: 500 বা 1000.50)">
            <button id="addBtn">➕ যোগ করুন</button>
        </div>
    
        <div class="total-box">
            <h3>মোট খরচ</h3>
            <div class="amount" id="totalAmount">০.০০ টাকা</div>
        </div>
    
        <div class="expense-list">
            <h3>খরচের তালিকা</h3>
            <ul class="expense-items" id="expenseList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
